services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-placeholder}/pl-jobhunter/backend:latest
    env_file: ./apps/backend/.env
    volumes:
      - ./apps/backend/wallet:/app/apps/backend/wallet:ro
    ports:
      - "3000:3000"
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.6.10
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  ollama_models:
