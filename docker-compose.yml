services:
  backend:
    image: ghcr.io/kin0-0ko/pl-jobhunter/backend:latest
    env_file: ./apps/backend/.env
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./apps/backend/wallet:/app/apps/backend/wallet:ro
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  ollama_models:
